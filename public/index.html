<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Haftstories — Becoming Haftstories</title>
  <meta
    name="description"
    content="Season One — Becoming Haftstories. Every stitch tells a story."
  />

  <meta property="og:title" content="Haftstories — Becoming Haftstories" />
  <meta
    property="og:description"
    content="Every stitch tells a story. A new story is taking shape."
  />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://haftstories.com" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,500;1,500&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --cream: #f4f0e8;
      --cream-light: #faf8f3;
      --purple: #5e1784;
      --ink: #201d21;
      --muted: #6f6971;
      --line: rgba(94, 23, 132, 0.24);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, rgba(94, 23, 132, 0.05), transparent 30rem),
        radial-gradient(circle at 85% 80%, rgba(94, 23, 132, 0.04), transparent 28rem),
        var(--cream);
      font-family: "Inter", Arial, sans-serif;
      font-weight: 300;
    }

    a { color: inherit; }

    .hero,
    .manifest {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 48px 24px;
    }

    .hero__content,
    .manifest__content {
      width: min(900px, 100%);
      text-align: center;
    }

    .brand {
      margin: 0;
      color: var(--purple);
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(3.4rem, 10vw, 8.5rem);
      font-weight: 500;
      letter-spacing: 0.03em;
      line-height: 0.95;
      text-transform: uppercase;
    }

    .season {
      margin: 28px 0 0;
      color: var(--purple);
      font-size: clamp(0.75rem, 1.8vw, 1rem);
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .claim {
      margin: 72px auto 0;
      max-width: 720px;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(2rem, 5.5vw, 4.8rem);
      font-style: italic;
      font-weight: 500;
      line-height: 1.12;
    }

    .taking-shape {
      margin: 28px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.3vw, 1.35rem);
      letter-spacing: 0.03em;
    }

    .scroll-link {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 72px;
      color: var(--purple);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-decoration: none;
      text-transform: uppercase;
    }

    .scroll-link__arrow {
      font-size: 1.6rem;
      animation: drift 1.8s ease-in-out infinite;
    }

    @keyframes drift {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(8px); }
    }

    .manifest {
      position: relative;
      background: var(--cream-light);
    }

    .manifest::before,
    .manifest::after {
      content: "";
      position: absolute;
      left: 50%;
      width: min(780px, calc(100% - 48px));
      height: 1px;
      background: var(--line);
      transform: translateX(-50%);
    }

    .manifest::before { top: 0; }
    .manifest::after { bottom: 0; }

    .eyebrow {
      margin: 0 0 34px;
      color: var(--purple);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .manifest__quote {
      margin: 0 auto;
      max-width: 820px;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(2.1rem, 6vw, 5rem);
      font-weight: 500;
      line-height: 1.14;
    }

    .manifest__small {
      margin: 42px auto 0;
      max-width: 620px;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.8;
    }

    .follow {
      padding: 96px 24px;
      text-align: center;
    }

    .follow__label {
      margin: 0;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .instagram {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
      padding: 14px 22px;
      border: 1px solid var(--purple);
      border-radius: 999px;
      color: var(--purple);
      font-weight: 500;
      text-decoration: none;
      transition:
        color 180ms ease,
        background-color 180ms ease,
        transform 180ms ease;
    }

    .instagram:hover,
    .instagram:focus-visible {
      color: var(--cream-light);
      background: var(--purple);
      transform: translateY(-2px);
    }

    .instagram svg {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
    }

    footer {
      padding: 0 24px 36px;
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-align: center;
    }

    @media (max-width: 600px) {
      .hero,
      .manifest { min-height: 92svh; }

      .claim { margin-top: 56px; }

      .scroll-link { margin-top: 56px; }

      .manifest__small br { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .scroll-link__arrow { animation: none; }
      .instagram { transition: none; }
    }
  </style>
</head>

<body>
  <main>
    <section class="hero" aria-labelledby="page-title">
      <div class="hero__content">
        <h1 class="brand" id="page-title">Haftstories</h1>

        <p class="season">Season One — Becoming Haftstories.</p>

        <p class="claim">Every stitch tells a story.</p>

        <p class="taking-shape">A new story is taking shape.</p>

        <a class="scroll-link" href="#manifest" aria-label="Read the manifest">
          Manifest
          <span class="scroll-link__arrow" aria-hidden="true">↓</span>
        </a>
      </div>
    </section>

    <section class="manifest" id="manifest" aria-labelledby="manifest-title">
      <div class="manifest__content">
        <p class="eyebrow">Manifest</p>

        <h2 class="manifest__quote" id="manifest-title">
          Some stories begin in museums.<br />
          Some among vineyards.<br />
          Some on the road.
        </h2>

        <p class="manifest__small">We simply embroider them.</p>
      </div>
    </section>

    <section class="follow" aria-labelledby="follow-title">
      <p class="follow__label" id="follow-title">Follow the journey</p>

      <a
        class="instagram"
        href="https://www.instagram.com/haftstories/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Follow Haftstories on Instagram"
      >
        <svg
          aria-hidden="true"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="3" y="3" width="18" height="18" rx="5"></rect>
          <circle cx="12" cy="12" r="4"></circle>
          <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"></circle>
        </svg>
        @haftstories
      </a>
    </section>
  </main>

  <footer>© 2026 Haftstories</footer>
</body>
</html>
